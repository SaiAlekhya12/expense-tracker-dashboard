<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Expense Tracker</h1>

    <form id="expenseForm">

        <input
            type="text"
            id="title"
            placeholder="Title"
            required>

        <input
            type="number"
            id="amount"
            placeholder="Amount"
            required>

        <input
            type="text"
            id="category"
            placeholder="Category"
            required>

        <input
            type="date"
            id="date"
            required>

        <input
            type="text"
            id="description"
            placeholder="Description">

        <button type="submit">
            Add Expense
        </button>

    </form>

    <h2>Expense List</h2>

    <table>

        <thead>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Action</th>
        </tr>

        </thead>

        <tbody id="expenseTable">

        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
